# Optional standalone source database.
#
# The main `docker-compose.yml` already includes `demo-postgres`.
# Keep this file only if you want to run the source database by itself
# against the shared `mlplatform` Docker network.

services:
  demo-postgres:
    image: postgres:15
    container_name: demo-postgres
    environment:
      POSTGRES_DB: retail_db
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
    ports:
      - "5433:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./demo-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mlplatform
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "analyst", "-d", "retail_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  demo_postgres_data:

networks:
  mlplatform:
    external: true
