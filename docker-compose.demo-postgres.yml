# ============================================================
#  Demo PostgreSQL  —  docker-compose.demo-postgres.yml
#
#  Simulates one of your real source databases.
#  Has a retail dataset pre-loaded (customers, orders, products,
#  order_items, events) plus two analyst views.
#
#  IMPORTANT: Start the main stack first so the mlplatform
#  network exists, then start this file:
#
#    docker compose up -d
#    docker compose -f docker-compose.demo-postgres.yml up -d
#
#  Connection (from outside Docker / CloudBeaver):
#    Host: YOUR_SERVER_LAN_IP   Port: 5433
#    DB: retail_db   User: analyst   Pass: analyst123
#
#  Connection (from inside Docker / Spark / Jupyter):
#    Host: demo-postgres         Port: 5432
# ============================================================

services:
  demo-postgres:
    image: postgres:15
    container_name: demo-postgres
    environment:
      POSTGRES_DB: retail_db
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
    ports:
      - "5433:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./demo-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mlplatform
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "analyst", "-d", "retail_db"]
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  demo_postgres_data:

networks:
  mlplatform:
    external: true
