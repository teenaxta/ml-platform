# Standalone source database.
#
# This simulates an external production database that Airbyte ingests from.
# It runs on the shared `mlplatform` Docker network so platform services
# (Trino, Airbyte, CloudBeaver) can reach it at host `demo-postgres`.
#
# Start BEFORE the main platform:
#   docker compose -f docker-compose.demo-postgres.yml up -d

services:
  demo-postgres:
    image: postgres:15
    platform: linux/amd64
    container_name: demo-postgres
    environment:
      POSTGRES_DB: retail_db
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst123
    ports:
      - "5433:5432"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./demo-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mlplatform
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "analyst", "-d", "retail_db" ]
      interval: 10s
      retries: 5
    restart: unless-stopped

  postgres-exporter-demo:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    platform: linux/amd64
    container_name: postgres-exporter-demo
    depends_on:
      demo-postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://analyst:analyst123@demo-postgres:5432/retail_db?sslmode=disable
    networks:
      - mlplatform
    restart: unless-stopped

volumes:
  demo_postgres_data:


networks:
  mlplatform:
    external: true
