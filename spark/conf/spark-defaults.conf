# spark/conf/spark-defaults.conf
# Iceberg + S3/MinIO integration — JARs downloaded from Maven on first job run

spark.jars.packages                  org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.iceberg:iceberg-aws-bundle:1.5.2,software.amazon.awssdk:url-connection-client:2.25.53,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.3

# Iceberg REST catalog
spark.sql.extensions                 org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.warehouse          org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.warehouse.type     jdbc
spark.sql.catalog.warehouse.uri      jdbc:postgresql://postgres-iceberg:5432/iceberg_catalog
spark.sql.catalog.warehouse.jdbc.user iceberg
spark.sql.catalog.warehouse.jdbc.password iceberg123
spark.sql.catalog.warehouse.jdbc.schema-version V1
spark.sql.catalog.warehouse.warehouse s3://warehouse/
spark.sql.catalog.warehouse.io-impl  org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.warehouse.http-client.type urlconnection
spark.sql.catalog.warehouse.client.region     us-east-1
spark.sql.catalog.warehouse.s3.endpoint          http://minio:9000
spark.sql.catalog.warehouse.s3.path-style-access true

# S3A filesystem for MinIO
spark.hadoop.fs.s3a.endpoint         http://minio:9000
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.impl             org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Performance
spark.sql.adaptive.enabled           true
spark.serializer                     org.apache.spark.serializer.KryoSerializer
spark.sql.shuffle.partitions         50
